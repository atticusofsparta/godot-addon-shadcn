name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.3-stable
  BASE_PATH: /godot-addon-shadcn/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + export templates
        run: |
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}"
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}/"

      - name: Export Godot example to web
        run: |
          mkdir -p build/web
          godot --headless --path . --import || true
          godot --headless --path . --export-release "Web" build/web/index.html
          test -f build/web/index.wasm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build docs site
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Embed web export in docs
        run: |
          mkdir -p website/dist/public/example
          cp -r build/web/* website/dist/public/example/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
